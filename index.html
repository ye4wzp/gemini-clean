<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0f1a;--bg-secondary:#111827;--bg-card:rgba(17,24,39,.85);
  --text-primary:#f9fafb;--text-secondary:#9ca3af;--text-muted:#6b7280;
  --accent:#10b981;--accent-hover:#059669;--accent-glow:rgba(16,185,129,.15);
  --border:rgba(255,255,255,.06);--border-hover:rgba(16,185,129,.3);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --shadow:0 8px 32px rgba(0,0,0,.3);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(10,15,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--accent);font-weight:700;font-size:18px}
.logo svg{width:28px;height:28px}
.logo span{color:var(--text-secondary);font-weight:400}
.nav{display:flex;align-items:center;gap:16px}
.nav a{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
.nav a:hover{color:var(--accent)}
.lang-btn{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-xs);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;transition:all .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Hero */
.hero{text-align:center;padding:80px 24px 48px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none}
.hero h2{font-size:clamp(28px,5vw,56px);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#f9fafb 0%,#9ca3af 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;position:relative}
.hero p{color:var(--text-secondary);font-size:clamp(14px,2vw,18px);max-width:600px;margin:0 auto}

/* Upload area */
.upload-wrapper{max-width:720px;margin:0 auto;padding:0 24px}
.upload-area{position:relative;border:2px dashed rgba(16,185,129,.3);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(16,185,129,.03)}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(16,185,129,.08);transform:translateY(-2px)}
.upload-area .icon{width:56px;height:56px;margin:0 auto 16px;background:rgba(16,185,129,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.upload-area:hover .icon{transform:scale(1.1)}
.upload-area .icon svg{width:28px;height:28px;color:var(--accent)}
.upload-area h3{font-size:18px;font-weight:600;margin-bottom:8px}
.upload-area p{color:var(--text-muted);font-size:14px}
.upload-area input{display:none}

/* Steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:720px;margin:32px auto 0;padding:0 24px}
.step-item{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;display:flex;align-items:center;gap:12px}
.step-num{width:32px;height:32px;background:rgba(16,185,129,.15);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step-item span{font-size:14px;font-weight:500}

/* Processing Section */
.process-section{max-width:1000px;margin:48px auto;padding:0 24px;display:none}
.process-section.active{display:block}

/* Single preview */
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.preview-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.preview-card .card-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.preview-card .card-header h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.preview-card .card-header .dot{width:8px;height:8px;border-radius:50%}
.dot-red{background:#ef4444}.dot-green{background:#10b981}
.preview-card .card-body{padding:16px;min-height:300px;display:flex;align-items:center;justify-content:center;background:repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%,transparent 0% 50%) 50%/20px 20px}
.preview-card img{max-width:100%;max-height:400px;border-radius:8px}
.card-info{font-size:12px;color:var(--text-muted);font-family:monospace}

/* Multi preview */
.multi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.multi-header h3{font-size:18px;font-weight:700}
.image-list{display:flex;flex-direction:column;gap:12px}
.image-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;display:flex;align-items:center;gap:16px;transition:border-color .2s}
.image-card:hover{border-color:var(--border-hover)}
.image-card .thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;background:rgba(255,255,255,.03)}
.image-card .info{flex:1;min-width:0}
.image-card .info h4{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.image-card .info .status-text{font-size:12px;color:var(--text-muted);margin-top:4px}
.image-card .actions{flex-shrink:0}

/* Action panel */
.action-panel{position:sticky;top:88px;background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:24px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-dark{background:#1f2937;color:#fff;border:1px solid var(--border)}.btn-dark:hover{background:#374151}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-block{width:100%}

/* Progress */
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#34d399);border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:13px;color:var(--text-muted);text-align:center}

/* Features */
.features{background:var(--bg-secondary);padding:80px 24px;border-top:1px solid var(--border)}
.features-inner{max-width:1000px;margin:0 auto}
.features h3{text-align:center;font-size:24px;font-weight:700;margin-bottom:40px}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.feature-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s}
.feature-card:hover{border-color:var(--border-hover);transform:translateY(-4px)}
.feature-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.feature-card h4{font-size:16px;font-weight:700;margin-bottom:8px}
.feature-card p{font-size:14px;color:var(--text-muted);line-height:1.6}

/* Footer */
.footer{padding:32px 24px;border-top:1px solid var(--border);text-align:center;margin-top:auto}
.footer p{color:var(--text-muted);font-size:13px}
.footer a{color:var(--accent);text-decoration:none}.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:768px){
  .preview-grid{grid-template-columns:1fr}
  .features-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr}
  .hero{padding:48px 24px 32px}
  .nav a.hide-mobile{display:none}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 20px;color:var(--text-primary);font-size:14px;z-index:100;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>

let currentLang = 'zh-CN';
function t(key) { return I18N[currentLang][key] || key; }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);

}
function toggleLang() {
  currentLang = currentLang === 'zh-CN' ? 'en-US' : 'zh-CN';
  document.getElementById('langBtn').textContent = currentLang === 'zh-CN' ? 'EN' : '中文';

function loadImg(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = src;
  });
}

function calcAlphaMap(imageData) {
  const { width, height, data } = imageData;
  const alphaMap = new Float32Array(width * height);
  for (let i = 0; i < alphaMap.length; i++) {
    const idx = i * 4;
    alphaMap[i] = Math.max(data[idx], data[idx+1], data[idx+2]) / 255.0;
  }
  return alphaMap;
}

function detectWatermark(w, h) {
  if (w > 1024 && h > 1024) return { size: 96, mr: 64, mb: 64 };
  return { size: 48, mr: 32, mb: 32 };
}

function removeWatermark(imageData, alphaMap, pos) {
  const { x, y, width, height } = pos;
  const data = imageData.data;
  const imgW = imageData.width;
  for (let row = 0; row < height; row++) {
    for (let col = 0; col < width; col++) {
      const imgIdx = ((y + row) * imgW + (x + col)) * 4;
      const aIdx = row * width + col;
      let alpha = alphaMap[aIdx];
      if (alpha < 0.002) continue;
      alpha = Math.min(alpha, 0.99);
      const oneMinusA = 1.0 - alpha;
      for (let c = 0; c < 3; c++) {
        const wm = data[imgIdx + c];
        data[imgIdx + c] = Math.max(0, Math.min(255, Math.round((wm - alpha * 255) / oneMinusA)));
      }
    }
  }
}

let alphaMap48 = null, alphaMap96 = null;
async function initEngine() {
  const [img48, img96] = await Promise.all([
    loadImg('data:image/png;base64,' + BG_48_B64),
    loadImg('data:image/png;base64,' + BG_96_B64)
  ]);
  const c48 = document.createElement('canvas'); c48.width = 48; c48.height = 48;
  const ctx48 = c48.getContext('2d'); ctx48.drawImage(img48, 0, 0);
  alphaMap48 = calcAlphaMap(ctx48.getImageData(0, 0, 48, 48));

  const c96 = document.createElement('canvas'); c96.width = 96; c96.height = 96;
  const ctx96 = c96.getContext('2d'); ctx96.drawImage(img96, 0, 0);
  alphaMap96 = calcAlphaMap(ctx96.getImageData(0, 0, 96, 96));
}

async function processImage(file) {
  const img = await loadImg(URL.createObjectURL(file));
  const canvas = document.createElement('canvas');
  canvas.width = img.width; canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const imageData = ctx.getImageData(0, 0, img.width, img.height);
  const wm = detectWatermark(img.width, img.height);
  const pos = { x: img.width - wm.size - wm.mr, y: img.height - wm.size - wm.mb, width: wm.size, height: wm.size };
  const aMap = wm.size === 96 ? alphaMap96 : alphaMap48;
  removeWatermark(imageData, aMap, pos);
  ctx.putImageData(imageData, 0, 0);
  URL.revokeObjectURL(img.src);
  return { canvas, img, wm };
}

function canvasToBlob(canvas, type, quality) {
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

// ===== Simple ZIP (deflate-free, store-only) =====
function createZip(files) {
  // files: [{name, data: Uint8Array}]
  const parts = []; let offset = 0; const centralDir = [];
  for (const f of files) {
    const nameBytes = new TextEncoder().encode(f.name);
    // Local file header
    const local = new Uint8Array(30 + nameBytes.length);
    const lv = new DataView(local.buffer);
    lv.setUint32(0, 0x04034b50, true); lv.setUint16(4, 20, true);
    lv.setUint16(8, 0, true); // stored
    lv.setUint16(12, 0, true); lv.setUint16(14, 0, true);
    const crc = crc32(f.data);
    lv.setUint32(16, crc, true);
    lv.setUint32(20, f.data.length, true); lv.setUint32(24, f.data.length, true);
    lv.setUint16(26, nameBytes.length, true);
    local.set(nameBytes, 30);
    parts.push(local, f.data);
    // Central directory entry
    const cd = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true); cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
    cv.setUint16(12, 0, true); cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, f.data.length, true); cv.setUint32(24, f.data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint32(42, offset, true);
    cd.set(nameBytes, 46);
    centralDir.push(cd);
    offset += 30 + nameBytes.length + f.data.length;
  }
  const cdStart = offset;
  let cdSize = 0;
  for (const cd of centralDir) { parts.push(cd); cdSize += cd.length; }
  // End of central directory
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true); ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true); ev.setUint32(16, cdStart, true);
  parts.push(eocd);
  const total = parts.reduce((s, p) => s + p.length, 0);
  const result = new Uint8Array(total);
  let pos2 = 0;
  for (const p of parts) { result.set(p, pos2); pos2 += p.length; }
  return result;
}

function crc32(data) {
  let crc = 0xFFFFFFFF;
  const table = crc32.table || (crc32.table = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) { let c = i; for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[i] = c; }
    return t;
  })());
  for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ===== App =====
let imageQueue = [];
let processedCount = 0;

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const singleSection = document.getElementById('singleSection');
const multiSection = document.getElementById('multiSection');

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function reset() {
  singleSection.classList.remove('active');
  multiSection.classList.remove('active');
  imageQueue.forEach(item => { if (item.url) URL.revokeObjectURL(item.url); if (item.resultUrl) URL.revokeObjectURL(item.resultUrl); });
  imageQueue = []; processedCount = 0;
  fileInput.value = '';
  document.getElementById('imageList').innerHTML = '';
  document.getElementById('downloadAllBtn').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '0/0';
}

document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('resetMultiBtn').addEventListener('click', reset);

// Upload handlers
uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', e => handleFiles(Array.from(e.target.files)));

function handleFiles(files) {
  const valid = files.filter(f => f.type.match(/image\/(jpeg|png|webp)/) && f.size < 20*1024*1024).slice(0, 50);
  if (!valid.length) return;
  reset();
  imageQueue = valid.map((file, i) => ({ id: Date.now() + i, file, name: file.name, status: 'pending', blob: null, url: null, resultUrl: null }));
  if (valid.length === 1) processSingle(imageQueue[0]);
  else processMulti();
}

async function processSingle(item) {
  singleSection.classList.add('active');
  const origImg = document.getElementById('origImg');
  const resultImg = document.getElementById('resultImg');
  const origInfo = document.getElementById('origInfo');
  const resultInfo = document.getElementById('resultInfo');

  item.url = URL.createObjectURL(item.file);
  origImg.src = item.url;

  try {
    const { canvas, img, wm } = await processImage(item.file);
    origInfo.textContent = `${img.width}×${img.height} | wm:${wm.size}×${wm.size}`;
    const blob = await canvasToBlob(canvas, item.file.type === 'image/jpeg' ? 'image/jpeg' : 'image/png', 0.95);
    item.blob = blob;
    item.resultUrl = URL.createObjectURL(blob);
    resultImg.src = item.resultUrl;
    resultInfo.textContent = `${img.width}×${img.height} | ${t('status.done')}`;
    item.status = 'done';
  } catch (e) {
    resultInfo.textContent = t('status.error');
    console.error(e);
  }

  document.getElementById('downloadSingleBtn').onclick = () => {
    if (!item.blob) return;
    const a = document.createElement('a');
    a.href = item.resultUrl;
    const ext = item.file.type === 'image/jpeg' ? '.jpg' : '.png';
    a.download = 'unwatermarked_' + item.name.replace(/\.[^.]+$/, '') + ext;
    a.click();
    showToast(t('toast.downloaded'));
  };
  singleSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function processMulti() {
  multiSection.classList.add('active');
  const list = document.getElementById('imageList');
  list.innerHTML = '';
  processedCount = 0;
  updateProgress();

  imageQueue.forEach(item => {
    item.url = URL.createObjectURL(item.file);
    const card = document.createElement('div');
    card.className = 'image-card'; card.id = 'card-' + item.id;
    card.innerHTML = `
      <img class="thumb" src="${item.url}" alt="${item.name}">
      <div class="info">
        <h4>${item.name}</h4>
        <div class="status-text" id="st-${item.id}"><span class="spinner"></span> ${t('status.processing')}</div>
      </div>
      <div class="actions">
        <button class="btn btn-dark btn-sm" id="dl-${item.id}" style="display:none" data-i18n="btn.download">${t('btn.download')}</button>
      </div>
    `;
    list.appendChild(card);
  });

  multiSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  processQueue();
}

async function processQueue() {
  const concurrency = 3;
  for (let i = 0; i < imageQueue.length; i += concurrency) {
    await Promise.all(imageQueue.slice(i, i + concurrency).map(async item => {
      try {
        const { canvas, img, wm } = await processImage(item.file);
        const blob = await canvasToBlob(canvas, item.file.type === 'image/jpeg' ? 'image/jpeg' : 'image/png', 0.95);
        item.blob = blob;
        item.resultUrl = URL.createObjectURL(blob);
        item.status = 'done';
        const st = document.getElementById('st-' + item.id);
        if (st) st.innerHTML = `<span style="color:var(--accent)">✓</span> ${img.width}×${img.height} | wm:${wm.size}`;
        const thumb = document.querySelector('#card-' + item.id + ' .thumb');
        if (thumb) thumb.src = item.resultUrl;
        const dlBtn = document.getElementById('dl-' + item.id);
        if (dlBtn) {
          dlBtn.style.display = 'inline-flex';
          dlBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = item.resultUrl;
            const ext = item.file.type === 'image/jpeg' ? '.jpg' : '.png';
            a.download = 'unwatermarked_' + item.name.replace(/\.[^.]+$/, '') + ext;
            a.click();
          };
        }
      } catch (e) {
        item.status = 'error';
        const st = document.getElementById('st-' + item.id);
        if (st) st.innerHTML = `<span style="color:#ef4444">✗</span> ${t('status.error')}`;
        console.error(e);
      }
      processedCount++;
      updateProgress();
    }));
  }
  if (imageQueue.some(i => i.status === 'done')) {
    document.getElementById('downloadAllBtn').style.display = 'inline-flex';
  }
}

function updateProgress() {
  const total = imageQueue.length;
  document.getElementById('progressText').textContent = processedCount + '/' + total;
  document.getElementById('progressFill').style.width = (total ? processedCount / total * 100 : 0) + '%';
}

document.getElementById('downloadAllBtn').addEventListener('click', async () => {
  const done = imageQueue.filter(i => i.status === 'done' && i.blob);
  if (!done.length) return;
  showToast(t('toast.zipReady'));
  const zipFiles = [];
  for (const item of done) {
    const ext = item.file.type === 'image/jpeg' ? '.jpg' : '.png';
    const name = 'unwatermarked_' + item.name.replace(/\.[^.]+$/, '') + ext;
    const buf = await item.blob.arrayBuffer();
    zipFiles.push({ name, data: new Uint8Array(buf) });
  }
  const zipData = createZip(zipFiles);
  const blob = new Blob([zipData], { type: 'application/zip' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'unwatermarked_' + Date.now() + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
});

// Init
initEngine().then(() => console.log('Engine ready')).catch(e => console.error('Engine init failed:', e));
</script>
